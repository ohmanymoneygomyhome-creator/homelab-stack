services:
  # ---------------------------------------------------------------------------
  # Nextcloud — Personal Cloud Storage (FPM + Nginx)
  # ---------------------------------------------------------------------------
  nextcloud:
    image: nextcloud:29.0.7-fpm-alpine
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - nextcloud-data:/var/www/html
      - nextcloud-custom:/var/www/html/custom_apps
      - nextcloud-config:/var/www/html/config
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-changeme}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_DOMAIN:-nextcloud.local}
      - POSTGRES_HOST=homelab-postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD:-nextcloud_secret}
      - REDIS_HOST=homelab-redis
      - REDIS_OTP_PORT=6379
      - REDIS_DATABASES=3
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_LIMIT=10G
    depends_on:
      - nextcloud-nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  nextcloud-nginx:
    image: nginx:1.27-alpine
    container_name: nextcloud-nginx
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - nextcloud-data:/var/www/html:ro
      - ./config/nginx/nextcloud.conf:/etc/nginx/conf.d/nextcloud.conf:ro
    depends_on:
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost:80/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nextcloud.rule=Host(`cloud.${DOMAIN}`)"
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls=true
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.regex=https://(.*)/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.replacement=https://$${1}/remote.php/dav/"

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: minio
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme-minio}
      - MINIO_BROWSER_REDIRECT_URL=https://minio.${DOMAIN}
      - MINIO_SITE_NAME=Homelab MinIO
      - MINIO_DOMAIN=s3.${DOMAIN}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)"
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls=true
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.services.minio-api.loadbalancer.server.port=9000

  # ---------------------------------------------------------------------------
  # FileBrowser — Lightweight File Manager
  # ---------------------------------------------------------------------------
  filebrowser:
    image: filebrowser/filebrowser:v2.31.1
    container_name: filebrowser
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - filebrowser-db:/database
      - ${STORAGE_PATH:-/data}:/srv
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - FB_DATABASE_DIR=/database
      - FB_ROOT=/srv
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)"
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls=true
      - traefik.http.services.filebrowser.loadbalancer.server.port=80

  # ---------------------------------------------------------------------------
  # Syncthing — P2P File Synchronization
  # ---------------------------------------------------------------------------
  syncthing:
    image: lscr.io/linuxserver/syncthing:1.27.11
    container_name: syncthing
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - syncthing-config:/config
      - syncthing-data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8384/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.syncthing.rule=Host(`sync.${DOMAIN}`)"
      - traefik.http.routers.syncthing.entrypoints=websecure
      - traefik.http.routers.syncthing.tls=true
      - traefik.http.services.syncthing.loadbalancer.server.port=8384

networks:
  internal:
    external: false
  proxy:
    external: true

volumes:
  nextcloud-data:
  nextcloud-custom:
  nextcloud-config:
  minio-data:
  filebrowser-db:
  syncthing-config:
  syncthing-data:
