upstream php-handler {
    server nextcloud:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Enforce HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Nextcloud data directory
    root /var/www/html;
    index index.php index.html;

    # Max upload size
    client_max_body_size 10G;
    client_body_timeout 3600s;
    proxy_read_timeout 3600s;

    # Security headers
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload;" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Real-IP $remote_addr;
    add_header X-Forwarded-Host $host;
    add_header X-Forwarded-Proto $scheme;

    # GZIP compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/javascript application/json application/xml application/xml+rss text/javascript text/plain text/xml;

    location = / {
        if ( $http_user_agent ~ ^DavClnt ) {
            return 302 /remote.php/webdav/$is_args$args;
        }
    }

    location / {
        rewrite ^ /index.php$request_uri;
    }

    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
        deny all;
    }

    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
        deny all;
    }

    location ~ \.php(?:$|/) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 3600s;
        fastcgi_send_timeout 3600s;
    }

    location ~ \.(?:css|js|svg|gif|ico|jpg|jpeg|png|webp|wasm|woff|woff2|ttf|otf|eot)$ {
        try_files $uri /index.php$request_uri;
        expires 6M;
        add_header Cache-Control "public, immutable";
    }

    # WebDAV
    location ~* ^/remote.php/(webdav|dav/) {
        rewrite ^/remote.php/(webdav|dav)/ /remote.php/webdav/ permanent;
    }

    location /remote.php/webdav/ {
        # Disable proxy buffering for large uploads
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 10G;
    }
}
