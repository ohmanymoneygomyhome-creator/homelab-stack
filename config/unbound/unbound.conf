# Unbound DNS Configuration
# This is a basic recursive DNS resolver configuration

server:
    # Listen on all interfaces
    interface: 0.0.0.0
    interface: ::0
    port: 53

    # Access control
    access-control: 0.0.0.0/0 allow
    access-control: ::/0 allow

    # verbosity level
    verbosity: 1

    # Logging
    logfile: ""
    use-syslog: yes
    log-replies: no
    log-queries: no

    # Performance
    num-threads: 2
    so-rcvbuf: 4m
    so-sndbuf: 4m
    so-reuseport: yes

    # Security
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
    harden-below-bogus: yes
    qname-minimisation: yes

    # Privacy
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16

    # Root hints
    root-hints: "/opt/unbound/etc/unbound/root.hints"

    # Module config
    module-config: validator iterator

# Remote control
remote-control:
    control-enable: yes
    control-interface: 0.0.0.0
    control-port: 8953
    server-key-file: "/opt/unbound/etc/unbound/unbound_server.key"
    server-cert-file: "/opt/unbound/etc/unbound/unbound_server.pem"
    control-key-file: "/opt/unbound/etc/unbound/unbound_control.key"
    control-cert-file: "/opt/unbound/etc/unbound/unbound_control.pem"
